apiVersion: v1
kind: Service
metadata:
  name: {{ include "pixeltable-app.fullname" . }}
  labels:
    {{- include "pixeltable-app.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: 8000
      protocol: TCP
  selector:
    {{- include "pixeltable-app.selectorLabels" . | nindent 4 }}
