# Pixeltable Starter Kit — local development
#
# Two persistent volumes that MUST be kept together:
#   pixeltable-data  -> /data/pixeltable   Pixeltable's managed store (catalog + blobs)
#   uploads          -> /app/data          raw uploaded files; Pixeltable rows reference
#                                          these paths (see backend/routers/data.py)
# Deleting `uploads` without also resetting the schema will leave dangling refs.
# For production, set PIXELTABLE_INPUT_MEDIA_DEST=s3://... so Pixeltable owns the
# media and the `uploads` volume can be dropped entirely.
services:
  app:
    build: .
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      PIXELTABLE_HOME: /data/pixeltable
      CORS_ORIGINS: "*"
    volumes:
      - pixeltable-data:/data/pixeltable
      - uploads:/app/data

volumes:
  pixeltable-data:
  uploads:
